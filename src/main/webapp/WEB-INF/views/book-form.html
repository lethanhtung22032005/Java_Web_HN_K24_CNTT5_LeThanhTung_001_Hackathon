<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Form</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
        integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
  <style>
    .error{
      color: red;
    }
  </style>
</head>
<body>
<form th:action="@{/books/save}" th:object="${book}" method="post">
  <input type="hidden" th:field="*{id}"/>

  <div class="form-group">
    <label>Title:</label>
    <input type="text"
           class="form-control" th:field="*{title}" aria-describedby="helpId" placeholder="Nhập title ...">
    <div th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="error"></div>
  </div>
  <div class="form-group">
    <label>Author:</label>
    <input type="text"
           class="form-control" th:field="*{author}" aria-describedby="helpId" placeholder="Nhập author ...">
    <div th:if="${#fields.hasErrors('author')}" th:errors="*{author}" class="error"></div>
  </div>
  <div class="form-group">
    <label>Quantity:</label>
    <input type="text"
           class="form-control" th:field="*{quantity}" aria-describedby="helpId" placeholder="Nhập quantity ...">
    <div th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}" class="error"></div>
  </div>
  <div class="form-group">
    <label>Image:</label>
    <input type="text"
           class="form-control" aria-describedby="helpId" placeholder="choose file">
  </div>
  <button type="submit" class="btn btn-primary">Submit</button>
</form>
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
